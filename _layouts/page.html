---
layout: default
---

<article class="post wrap">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}
      <p class="hero-lede" style="margin-top: 0.5rem;">{{ page.subtitle }}</p>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
