<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">

  {% seo %}

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }} — RSS" href="{{ '/feed.xml' | relative_url }}">

  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/favicon-32x32.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/favicon-16x16.png' | relative_url }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/apple-touch-icon.png' | relative_url }}">
  <link rel="manifest" href="{{ '/assets/site.webmanifest' | relative_url }}">
</head>
<body>

<header class="site-header">
  <div class="wrap site-header-inner">
    <a href="{{ '/' | relative_url }}" class="site-brand">{{ site.author.name }}</a>
    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>Writing</a>
      <a href="{{ '/about/' | relative_url }}"{% if page.url contains '/about' %} class="active"{% endif %}>About</a>
      <a href="{{ '/archive/' | relative_url }}"{% if page.url contains '/archive' %} class="active"{% endif %}>Archive</a>
      <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
    </nav>
  </div>
</header>

<main>
  {{ content }}
</main>

<footer class="site-footer">
  <div class="wrap site-footer-inner">
    <div>© {{ site.time | date: '%Y' }} {{ site.author.name }} · {{ site.author.location }}</div>
    <div>
      <a href="https://github.com/{{ site.author.github }}">GitHub</a>
      <a href="https://www.linkedin.com/in/{{ site.author.linkedin }}">LinkedIn</a>
      <a href="https://stackoverflow.com/users/{{ site.author.stackoverflow }}">Stack Overflow</a>
      <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
    </div>
  </div>
</footer>

</body>
</html>
